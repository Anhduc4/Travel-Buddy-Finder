server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
        - id: user-service-users
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: trip-service
          uri: lb://trip-service
          predicates:
            - Path=/api/trips/**
        - id: join-request-service
          uri: lb://join-request-service
          predicates:
            - Path=/api/join-requests/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**
        - id: chat-service-ws
          uri: lb:ws://chat-service
          predicates:
            - Path=/ws/**
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**

jwt:
  secret: ${JWT_SECRET:TravelBuddyFinderSecretKeyForJWT2024MustBe256BitsLong!!}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
